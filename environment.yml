name: coconut_mapping
channels:
  - conda-forge
  - pytorch
dependencies:
  # --- Python ---
  - python=3.11

  # --- Core scientific ---
  - numpy
  - scipy
  - pandas
  - scikit-learn          # stratified train/val split

  # --- Geospatial ---
  - rasterio
  - geopandas
  - shapely
  - pyproj
  - fiona
  - gdal

  # --- Visualization ---
  - matplotlib
  - tqdm

  # --- Deep Learning ---
  - pytorch
  - torchvision

  # --- Utilities ---
  - pip
  - pip:
      # --- Satellite / STAC ---
      - planetary-computer
      - pystac-client
      - tenacity
      - requests

      # --- Data augmentation (training pipeline) ---
      # Used in scripts/dl/dataset.py for spatial & radiometric augmentation
      # (flips, rotations, brightness/contrast, blur, noise)
      - albumentations>=1.3.1

      # --- Segmentation model zoo (optional but recommended) ---
      # Provides ResNet / EfficientNet UNet encoders for ablation studies
      - segmentation-models-pytorch>=0.3.3
